<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mobile Dodge Game</title>
<style>
* { touch-action: manipulation; }
body {
  margin: 0;
  background: #0a0a14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
  overflow: hidden;
}
canvas {
  background: #141428;
  border: 3px solid #ff9500;
  border-radius: 12px;
  display: block;
}
#ui {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 24px;
  font-weight: bold;
  text-align: center;
  width: 100%;
}
#controls {
  position: absolute;
  bottom: 30px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 40px;
  box-sizing: border-box;
}
.btn {
  width: 100px;
  height: 100px;
  background: rgba(255,149,0,0.3);
  border: 3px solid #ff9500;
  border-radius: 50%;
  color: white;
  font-size: 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;
}
.btn:active {
  background: rgba(255,149,0,0.6);
  transform: scale(0.9);
}
#gameOver {
  position: absolute;
  color: white;
  text-align: center;
  display: none;
}
#gameOver h1 {
  font-size: 40px;
  color: #ff3b30;
  margin: 0;
}
#restart {
  margin-top: 15px;
  padding: 12px 30px;
  font-size: 18px;
  background: #34c759;
  border: none;
  border-radius: 10px;
  color: white;
}
</style>
</head>
<body>
<div id="ui">Score: 0</div>
<canvas id="game"></canvas>
<div id="controls">
  <div class="btn" id="left">←</div>
  <div class="btn" id="right">→</div>
</div>
<div id="gameOver">
  <h1>Game Over</h1>
  <p id="finalScore">Score: 0</p>
  <button id="restart" onclick="restart()">Restart</button>
</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = 360;
canvas.height = window.innerHeight - 200;
const scoreEl = document.getElementById("ui");
const gameOverEl = document.getElementById("gameOver");
const finalScoreEl = document.getElementById("finalScore");
let player = {x: 155, y: canvas.height - 50, w: 50, h: 20, speed: 6};
let blocks = [];
let movingLeft = false;
let movingRight = false;
let score = 0;
let running = true;
let spawnTimer = 0;
let spawnRate = 900;
document.getElementById("left").addEventListener("touchstart", () => movingLeft = true);
document.getElementById("left").addEventListener("touchend", () => movingLeft = false);
document.getElementById("right").addEventListener("touchstart", () => movingRight = true);
document.getElementById("right").addEventListener("touchend", () => movingRight = false);
document.addEventListener("keydown", e => {
  if(e.key === "ArrowLeft" || e.key === "a") movingLeft = true;
  if(e.key === "ArrowRight" || e.key === "d") movingRight = true;
});
document.addEventListener("keyup", e => {
  if(e.key === "ArrowLeft" || e.key === "a") movingLeft = false;
  if(e.key === "ArrowRight" || e.key === "d") movingRight = false;
});
function spawnBlock() {
  blocks.push({
    x: Math.random() * (canvas.width - 30),
    y: -30,
    w: 30,
    h: 30,
    speed: 2 + Math.random() * 4
  });
}
function update(delta) {
  if(!running) return;
  if(movingLeft) player.x -= player.speed;
  if(movingRight) player.x += player.speed;
  player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
  spawnTimer += delta;
  if(spawnTimer > spawnRate) {
    spawnBlock();
    spawnTimer = 0;
    if(spawnRate > 350) spawnRate -= 5;
  }
  for(let i = blocks.length - 1; i >= 0; i--) {
    blocks[i].y += blocks[i].speed;
    if(blocks[i].y > canvas.height) {
      blocks.splice(i, 1);
      score++;
      scoreEl.textContent = "Score: " + score;
      continue;
    }
    if(player.x < blocks[i].x + blocks[i].w &&
       player.x + player.w > blocks[i].x &&
       player.y < blocks[i].y + blocks[i].h &&
       player.y + player.h > blocks[i].y) {
      gameOver();
    }
  }
}
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#34c759";
  ctx.fillRect(player.x, player.y, player.w, player.h);
  ctx.fillStyle = "#ff3b30";
  blocks.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
}
let lastTime = 0;
function loop(timestamp) {
  let delta = timestamp - lastTime;
  lastTime = timestamp;
  update(delta);
  draw();
  if(running) requestAnimationFrame(loop);
}
function gameOver() {
  running = false;
  finalScoreEl.textContent = "Score: " + score;
  gameOverEl.style.display = "block";
}
function restart() {
  player.x = canvas.width/2 - 25;
  blocks = [];
  score = 0;
  spawnRate = 900;
  running = true;
  scoreEl.textContent = "Score: 0";
  gameOverEl.style.display = "none";
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
